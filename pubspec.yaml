name: ilk_yardim_app
description: "Sertifikalı ilk yardım gönüllüleri platformu — KLİNİK NABIZ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # state management
  provider: ^6.1.2

  # routing
  go_router: ^14.6.0

  # firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  firebase_app_check: ^0.3.1+3
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.3

  # map & location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  flutter_polyline_points: ^2.1.0
  http: ^1.2.2

  # ui
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # notifications
  flutter_local_notifications: ^18.0.1

  # media + background
  image_picker: ^1.1.2
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.0

  # deep links to native nav apps
  url_launcher: ^6.3.1

  # utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/brand/
    - assets/images/
    - assets/icons/
